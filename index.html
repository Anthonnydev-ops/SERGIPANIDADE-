<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sergipanidade - Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

    <div class="login-box">

        <h1 class="logo">SERGIPANIDADE</h1>

        <h2>SEJA BEM-VINDO DE VOLTA!</h2>

        <form>

            <label>Email</label>
            <input type="email" placeholder="Informe o seu e-mail" id="EmailInput">

            <label>Senha</label>
            <input type="password" placeholder="Informe a sua senha" id="SenhaInput">

            <button type="button" id="btn" onclick="fazerLogin()">ENTRAR</button>
            
        </form>

        <div class="links">
            <a href="#">Não tem conta?</a>
            <a href="#">Esqueceu a senha?</a>
        </div>

        <p class="social-text">Continuar com</p>

        <div class="social-login">

            <button class="google">
                <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png">
            </button>

            <button class="facebook">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
            </button>

        </div>

    </div>

</div>
<script src="script.js"></script>
</body>
</html>
